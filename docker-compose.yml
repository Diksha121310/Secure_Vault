services:

  mongodb:
    image: mongo:7
    container_name: securevault-mongo
    restart: always

    ports:
      - "27017:27017"

    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    container_name: securevault-backend
    restart: always

    depends_on:
      - mongodb

    ports:
      - "8081:8081"

    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/SecureVaultDB
      resend.api.key: re_Rrx8j6Fb_7kYRFdxH9UxGMTkE7dFw3xSg

  frontend:
    build: ./frontend
    container_name: securevault-frontend
    restart: always

    depends_on:
      - backend

    ports:
      - "3000:3000"

volumes:
  mongo-data: